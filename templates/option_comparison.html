<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Option Chain Visualizer</title>

    <!-- External libraries (served locally) -->
    <script src="/static/js/socket.io.js"></script>
    <script src="/static/js/plotly-2.27.0.min.js"></script>

    <!-- Decoupled stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="dark-mode">
    <div id="loading">Loading Option Data...</div>

    <!-- ── NEW: Dashboard Header (Sticky) ────────────────────────── -->
    <header class="dashboard-header">
        <div class="header-metric">
            <span class="metric-label">NIFTY 50</span>
            <span id="header-spot-price" class="metric-value">--</span>
        </div>
        <div class="header-metric">
            <span class="metric-label">Market Trend</span>
            <span id="header-market-trend" class="metric-value" style="color:var(--neon-green)">BULLISH</span>
        </div>
        <div class="header-metric">
            <span class="metric-label">IV Trend</span>
            <span id="header-iv-trend" class="metric-value" style="color:var(--accent-blue)">STABLE</span>
        </div>
        <div class="header-metric">
            <span class="metric-label">Bias Summary</span>
            <span id="header-bias" class="metric-value">Long Build-up</span>
        </div>
    </header>

    <div class="app-container">

        <!-- -- Sidebar Controls (Compact) ----------------------- -->
        <div class="sidebar">
            <div>
                <h2>Market</h2>
                <div id="symbol-selector-container"></div>
            </div>

            <div>
                <h2>Controls</h2>
                <div class="control-group" style="margin-top: 10px;">
                    <label for="date-picker" style="display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px;">Date</label>
                    <input type="date" id="date-picker" 
                        style="width: 100%; padding: 8px; background: #334155; color: white; border: none; border-radius: 4px; margin-bottom: 10px;">
                </div>

                <div class="control-group">
                    <label class="switch">
                        <input type="checkbox" id="live-toggle" checked>
                        <span class="slider-toggle"></span>
                        <span class="live-label" style="margin-left: 10px;">Live Mode</span>
                    </label>
                </div>

                <div class="control-group" style="margin-top: 10px;">
                    <label class="switch">
                        <input type="checkbox" id="next-expiry-chk">
                        <span class="slider-toggle"></span>
                        <span class="live-label" style="margin-left: 10px;">Next Expiry</span>
                    </label>
                </div>

                <div class="control-group" style="margin-top: 10px;">
                    <label for="interval-select" style="display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px;">Interval</label>
                    <select id="interval-select"
                        style="width: 100%; padding: 8px; background: #334155; color: white; border: none; border-radius: 4px;">
                        <option value="1">1 Min</option>
                        <option value="5">5 Min</option>
                        <option value="15" selected>15 Min</option>
                    </select>
                </div>

                <div class="control-group" style="margin-top: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                        <label style="font-size: 12px; color: #94a3b8;">Time</label>
                        <span id="time-display" style="font-size: 12px; font-weight: bold; color: var(--accent-blue);">--:--</span>
                    </div>
                    <input type="range" id="time-slider" min="0" max="100" value="100" style="width: 100%;">
                    <div class="slider-labels" style="display: flex; justify-content: space-between; font-size: 9px; color: #64748b; margin-top: 2px;">
                        <span>09:15</span>
                        <span>12:30</span>
                        <span>15:30</span>
                    </div>
                </div>
            </div>

            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border);">
                <div style="display: flex; justify-content: space-between; align-items: baseline;">
                    <h2 style="margin:0;">Instruments</h2>
                    <span id="header-expiry-val" style="font-size: 11px; color: var(--accent-blue); padding: 2px 6px; background: rgba(56,189,248,0.1); border-radius: 4px; border: 1px solid rgba(56,189,248,0.2);">Expiry: --</span>
                </div>
                
                <div class="control-group" style="margin-top: 5px; flex-direction: row; align-items: center; justify-content: flex-end; gap: 5px;">
                    <span style="font-size: 10px; color: #94a3b8;">Next</span>
                    <label class="switch" style="transform: scale(0.8);">
                        <input type="checkbox" id="next-expiry-chk">
                        <span class="slider-toggle"></span>
                    </label>
                </div>

                <div class="instrument-filters" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px;">
                    <button class="btn" onclick="app.filterInstruments('all')">All</button>
                    <button class="btn" onclick="app.filterInstruments('ce')">All CE</button>
                    <button class="btn" onclick="app.filterInstruments('pe')">All PE</button>
                    <button class="btn" onclick="app.filterInstruments('intraday')">Intraday</button>
                    <button class="btn active" onclick="app.filterInstruments('scalping')">Scalping</button>
                    <button class="btn" onclick="app.filterInstruments('clear')">Clear</button>
                </div>

                <div id="instrument-list" class="scrollable-list" style="max-height: 250px; margin-top: 10px; border-color: var(--glass-border);"></div>
            </div>

            <div style="margin-top: 20px;">
                <h2>Metrics (Criteria)</h2>
                <div id="metric-list" style="display: flex; flex-direction: column; gap: 8px;">
                    <label class="checkbox-container">
                        <input type="checkbox" class="metric-cb" value="ltp" checked> LTP
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" class="metric-cb" value="change_in_ltp"> Change in LTP
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" class="metric-cb" value="roc_oi" checked> ROC OI (%)
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" class="metric-cb" value="roc_volume" checked> ROC Volume (%)
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" class="metric-cb" value="roc_iv" checked> ROC IV (%)
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" class="metric-cb" value="coi_vol_ratio" checked> COI/Vol Ratio
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" class="metric-cb" value="spot_price" checked> Spot Price
                    </label>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="renderCharts()" style="width: 100%; padding: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em;">
                    Update Charts
                </button>
            </div>

            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--glass-border);">
                <h2>Upstox Token</h2>
                <div class="control-group" style="margin-top: 5px;">
                    <button class="btn" onclick="refreshToken()" style="width: 100%; background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid var(--glass-border);">
                        Refresh Token
                    </button>
                </div>
            </div>

            <div>
                <h2>Trade Suggestions</h2>
                <div id="suggestions-container">
                    <div style="font-size: 11px; color: #94a3b8;">Select a signal to see trade levels...</div>
                </div>
            </div>
        </div>

        <!-- -- Main Content Area -------------------------------- -->
        <div class="main-content">
            <!-- ── NEW: Top Signals Panel ────────────────────────── -->
            <div id="signals-panel-container"></div>

            <!-- ── NEW: Decision Tabs ────────────────────────────── -->
            <div class="decision-tabs">
                <button class="tab-btn active" onclick="app.switchTab('overview')">Overview</button>
                <button class="tab-btn" onclick="app.switchTab('oi')">OI Analysis</button>
                <button class="tab-btn" onclick="app.switchTab('vol')">Volume</button>
                <button class="tab-btn" onclick="app.switchTab('iv')">IV Trend</button>
                <button class="tab-btn" onclick="app.switchTab('ltp')">LTP</button>
            </div>

            <div id="charts-area">
                <!-- Charts injected by ChartRenderer.js -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/components/BaseComponent.js"></script>
    <script src="/static/js/services/InstrumentColorService.js"></script>
    <script src="/static/js/services/DecisionEngine.js"></script>
    <script src="/static/js/components/SymbolSelector.js"></script>
    <script src="/static/js/components/TimeSelector.js"></script>
    <script src="/static/js/components/InstrumentSelector.js"></script>
    <script src="/static/js/components/MetricSelector.js"></script>
    <script src="/static/js/components/SignalsPanel.js"></script>
    <script src="/static/js/components/ChartRenderer.js"></script>
    <script src="/static/js/services/ApiService.js"></script>
    <script src="/static/js/services/DataService.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
